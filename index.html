<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow — Inventory & Profit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Sora', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 font-sans text-slate-100 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <div id="sidebar" class="w-64 shrink-0 bg-slate-900 border-r border-slate-800 flex flex-col z-10 h-full"></div>

    <!-- Main Area -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <div id="mainContent" class="flex-1 overflow-y-auto bg-slate-950"></div>
    </div>

    <!-- Modal Backdrop -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-40 hidden"></div>

    <!-- Modal Container -->
    <div id="modalContainer" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden pointer-events-none"></div>

    <!-- Toast notifications -->
    <div id="toastArea" class="fixed top-5 right-5 z-[100] flex flex-col gap-2"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        /* ─── GLOBALS ─────────────────────────────────────────────────────── */
        window.currentPage = "dashboard.php";

        /* ─── TOAST ───────────────────────────────────────────────────────── */
        window.toast = function(msg, type = "success") {
            const colors = {
                success: "bg-emerald-500/10 border-emerald-500/30 text-emerald-400",
                error:   "bg-rose-500/10 border-rose-500/30 text-rose-400",
                info:    "bg-sky-500/10 border-sky-500/30 text-sky-400"
            };
            const icons = {
                success: `<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`,
                error:   `<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>`,
                info:    `<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`
            };
            const t = $(`<div class="flex items-center gap-2.5 px-4 py-3 rounded-xl border text-sm font-medium ${colors[type]} translate-x-0 transition-all duration-300 shadow-xl">
                ${icons[type]} <span>${msg}</span>
            </div>`);
            $("#toastArea").append(t);
            setTimeout(() => t.remove(), 3500);
        };

        /* ─── MODAL ───────────────────────────────────────────────────────── */
        window.showModal = function(type, extra = {}) {
            const payload = Object.assign({ type }, extra);
            $.post("frontend/modals.php", payload, function(html) {
                $("#modalContainer").html(html)
                    .removeClass("hidden")
                    .css("pointer-events", "auto");
                $("#modalOverlay").removeClass("hidden");
            });
        };

        window.closeModal = function() {
            $("#modalContainer").addClass("hidden").css("pointer-events", "none").empty();
            $("#modalOverlay").addClass("hidden");
        };

        /* ─── PAGE LOADER ─────────────────────────────────────────────────── */
        function loadPage(page) {
            window.currentPage = page;
            $("#mainContent").html(`
                <div class="flex items-center justify-center h-64">
                    <div class="w-6 h-6 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            `).load("frontend/" + page);
        }

        window.reloadPage = function() { loadPage(window.currentPage); };

        /* ─── INIT ────────────────────────────────────────────────────────── */
        $(function () {
            $("#sidebar").load("frontend/sidebar.php", function () {
                // Set initial active
                $(`[data-page="dashboard.php"]`).addClass("sf-active");
            });

            loadPage("dashboard.php");

            $(document).on("click", ".nav-link", function (e) {
                e.preventDefault();
                $(".nav-link").removeClass("sf-active");
                $(this).addClass("sf-active");
                loadPage($(this).data("page"));
            });

            // Close modal on backdrop click
            $(document).on("click", "#modalOverlay", closeModal);
        });
    </script>
</body>
</html>
